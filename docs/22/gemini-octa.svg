<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="150" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">1. Sphere</text>
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">2. Octahedron</text>
  <text x="780" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">3. Octahedral Map (1:1)</text>

  <circle cx="150" cy="200" r="80" fill="#F0F8FF" stroke="#ccc" stroke-width="1.5"/>
  <path d="M 70,200 A 80,20 0 0,0 230,200" fill="none" stroke="#FF0000" stroke-width="2"/>
  <path d="M 70,200 A 80,20 0 0,1 230,200" fill="none" stroke="#FF0000" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 150,120 A 30,80 0 0,0 150,280" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <path d="M 150,120 A 30,80 0 0,1 150,280" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <text x="150" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">N</text>
  <text x="150" y="310" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>

  <line x1="250" y1="200" x2="310" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">project</text>

  <line x1="590" y1="200" x2="635" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">unfold</text>

  <line x1="350" y1="200" x2="470" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="550" y1="200" x2="470" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="100" x2="470" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="300" x2="470" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <path d="M 350,200 L 470,160 L 550,200" fill="none" stroke="#FF0000" stroke-width="2" stroke-dasharray="4,4"/>

  <polygon points="350,200 450,100 430,240" fill="#85E085" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="450,100 550,200 430,240" fill="#82C0FF" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="350,200 430,240 450,300" fill="#33B333" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="430,240 550,200 450,300" fill="#3388E6" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  
  <path d="M 350,200 L 430,240 L 550,200" fill="none" stroke="#FF0000" stroke-width="2.5"/>
  
  <circle cx="450" cy="100" r="4" fill="#000"/>
  <circle cx="450" cy="300" r="4" fill="#000"/>

  <text x="450" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">N</text>
  <text x="450" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>
  <text x="330" y="205" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">-X</text>
  <text x="565" y="205" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">+X</text>
  <text x="430" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">+Z</text>
  <text x="480" y="150" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">-Z</text>


  <g transform="translate(0, 0)">
    <polygon points="780,200 900,200 780,320" fill="#82C0FF" stroke="#333" stroke-width="1"/>
    <polygon points="780,200 780,320 660,200" fill="#85E085" stroke="#333" stroke-width="1"/>
    <polygon points="780,200 660,200 780,80" fill="#FF99CC" stroke="#333" stroke-width="1"/>
    <polygon points="780,200 780,80 900,200" fill="#FFE066" stroke="#333" stroke-width="1"/>
    
    <polygon points="900,200 900,320 780,320" fill="#3388E6" stroke="#333" stroke-width="1"/>
    <polygon points="660,200 780,320 660,320" fill="#33B333" stroke="#333" stroke-width="1"/>
    <polygon points="660,200 660,80 780,80" fill="#E64D99" stroke="#333" stroke-width="1"/>
    <polygon points="900,200 780,80 900,80" fill="#E6B800" stroke="#333" stroke-width="1"/>
    
    <rect x="660" y="80" width="240" height="240" fill="none" stroke="#333" stroke-width="2"/>

    <polygon points="780,80 900,200 780,320 660,200" fill="none" stroke="#FF0000" stroke-width="3"/>

    <circle cx="780" cy="200" r="4" fill="#000"/>
    <circle cx="660" cy="80" r="4" fill="#000"/>
    <circle cx="900" cy="80" r="4" fill="#000"/>
    <circle cx="660" cy="320" r="4" fill="#000"/>
    <circle cx="900" cy="320" r="4" fill="#000"/>

    <text x="780" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">N</text>
    <text x="650" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>
    <text x="910" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>
    <text x="650" y="335" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>
    <text x="910" y="335" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">S</text>

    <text x="915" y="205" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">+X</text>
    <text x="645" y="205" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">-X</text>
    <text x="780" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">+Z</text>
    <text x="780" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">-Z</text>
  </g>

  <rect x="330" y="370" width="300" height="30" rx="5" fill="#f8f9fa" stroke="#ccc"/>
  <line x1="360" y1="385" x2="390" y2="385" stroke="#FF0000" stroke-width="3"/>
  <text x="400" y="390" font-family="sans-serif" font-size="14" fill="#333">Equator</text>
  <circle cx="490" cy="385" r="4" fill="#000"/>
  <text x="500" y="390" font-family="sans-serif" font-size="14" fill="#333">Pole (N/S)</text>

</svg>
