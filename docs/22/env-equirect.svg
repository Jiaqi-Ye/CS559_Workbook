<?xml version="1.0" encoding="UTF-8"?>
<!--
  Equirectangular (Lat-Long) Projection
  Shows how the sphere's latitude and longitude map to x and y in a 2:1 rectangle.
  Annotates the pole distortion and equator accuracy.
  CS559 Computer Graphics – Workbook 05
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" width="580" height="340">

  <defs>
    <marker id="eq-arr" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#374151"/>
    </marker>
    <marker id="eq-arr-red" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#DC2626"/>
    </marker>
    <marker id="eq-arr-bl" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#1D4ED8"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════
       SPHERE SCHEMATIC (left side)
       Center (130, 165), radius 110
       ═══════════════════════════════════════════════ -->
  <!-- Sphere fill -->
  <circle cx="130" cy="165" r="110" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>

  <!-- Latitude ellipses (orthographic from slight elevation) -->
  <!-- Equator: rx=110, ry=38 -->
  <ellipse cx="130" cy="165" rx="110" ry="38"
           fill="none" stroke="#3B82F6" stroke-width="1.8"/>
  <!-- Back half dashed -->
  <!-- +30° latitude: y = 165-55 = 110, rx=95, ry=33 -->
  <ellipse cx="130" cy="110" rx="95" ry="33"
           fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- -30° latitude: y = 165+55 = 220 -->
  <ellipse cx="130" cy="220" rx="95" ry="33"
           fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- +60°: y=165-95=70, rx=55, ry=19 -->
  <ellipse cx="130" cy="70" rx="55" ry="19"
           fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <!-- -60°: y=165+95=260 -->
  <ellipse cx="130" cy="260" rx="55" ry="19"
           fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Longitude arcs — front meridian (straight line through center) -->
  <line x1="130" y1="55" x2="130" y2="275"
        stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Longitude arcs at ±60° (represented as curves approximated by bezier) -->
  <!-- +60° longitude: arc from N pole (130,55) to S pole (130,275) passing through (130+95, 165) -->
  <path d="M 130 55 Q 233 100 225 165 Q 233 230 130 275"
        fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- -60° longitude -->
  <path d="M 130 55 Q 27 100 35 165 Q 27 230 130 275"
        fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Pole labels -->
  <text x="130" y="48" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">N</text>
  <text x="130" y="292" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">S</text>
  <text x="249" y="169" text-anchor="start"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">Equator</text>

  <!-- Direction arrow from center outward to a point on sphere -->
  <circle cx="130" cy="165" r="3" fill="#374151"/>
  <line x1="130" y1="165" x2="200" y2="110"
        stroke="#7C3AED" stroke-width="2" marker-end="url(#eq-arr)"/>
  <text x="205" y="106" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">
    one direction
  </text>

  <!-- ═══════════════════════════════════════════════
       ARROW: sphere → rectangle
       ═══════════════════════════════════════════════ -->
  <line x1="248" y1="165" x2="272" y2="165"
        stroke="#374151" stroke-width="2" marker-end="url(#eq-arr)"/>
  <text x="255" y="158" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">map</text>

  <!-- ═══════════════════════════════════════════════
       EQUIRECTANGULAR RECTANGLE (right side)
       x=285..565, y=45..285 → 280×240 = 2.33:1 (approximately 2:1)
       Let's use 280×140 at y=95..235 for a clean 2:1 ratio
       x=285, y=95, w=280, h=140
       ═══════════════════════════════════════════════ -->
  <rect x="285" y="95" width="280" height="140"
        fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>

  <!-- Latitude lines (7 bands = 30° each): y from 95 to 235 in steps of 140/6 ≈ 23.3 -->
  <!-- 90° N = y=95, 0° = y=165, 90° S = y=235 -->
  <!-- +60°: y=95+23.3=118.3 ≈ 118 -->
  <line x1="285" y1="118" x2="565" y2="118" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- +30°: y=95+46.7=141.7 ≈ 142 -->
  <line x1="285" y1="142" x2="565" y2="142" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Equator: y=165 -->
  <line x1="285" y1="165" x2="565" y2="165" stroke="#3B82F6" stroke-width="2"/>
  <!-- -30°: y=188 -->
  <line x1="285" y1="188" x2="565" y2="188" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- -60°: y=212 -->
  <line x1="285" y1="212" x2="565" y2="212" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Longitude lines: x from 285 to 565 in 6 steps = 280/6 ≈ 46.7 -->
  <!-- -180°=285, -120°=331.7, -60°=378.3, 0°=425, +60°=471.7, +120°=518.3, +180°=565 -->
  <line x1="332" y1="95" x2="332" y2="235" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="378" y1="95" x2="378" y2="235" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="425" y1="95" x2="425" y2="235" stroke="#3B82F6" stroke-width="2"/>  <!-- Prime meridian -->
  <line x1="472" y1="95" x2="472" y2="235" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="518" y1="95" x2="518" y2="235" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Pole labels on the rectangle -->
  <text x="425" y="90" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">
    North Pole (90°N)
  </text>
  <text x="425" y="248" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">
    South Pole (90°S)
  </text>
  <!-- Equator label -->
  <text x="570" y="169" text-anchor="start"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">Equator</text>
  <!-- Prime meridian label -->
  <text x="425" y="260" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">0°</text>
  <text x="285" y="260" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">−180°</text>
  <text x="565" y="260" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">+180°</text>

  <!-- DISTORTION ANNOTATION: circles at equator vs pole -->
  <!-- At the equator, a small circle in the scene maps to a circle in the image -->
  <ellipse cx="425" cy="165" rx="10" ry="10"
           fill="#FEE2E2" fill-opacity="0.8" stroke="#DC2626" stroke-width="1.8"/>
  <!-- At the north pole, the same circle in the scene becomes a stretched horizontal band -->
  <ellipse cx="425" cy="97" rx="40" ry="5"
           fill="#FEE2E2" fill-opacity="0.8" stroke="#DC2626" stroke-width="1.8"/>

  <!-- Annotation arrows and text for distortion -->
  <line x1="425" y1="155" x2="425" y2="108"
        stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="432" y="133" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">
    same solid
  </text>
  <text x="432" y="144" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">
    angle, but
  </text>
  <text x="432" y="155" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">
    stretched!
  </text>

  <!-- Aspect ratio annotation -->
  <line x1="285" y1="278" x2="565" y2="278" stroke="#374151" stroke-width="1.2"/>
  <line x1="285" y1="273" x2="285" y2="283" stroke="#374151" stroke-width="1.2"/>
  <line x1="565" y1="273" x2="565" y2="283" stroke="#374151" stroke-width="1.2"/>
  <text x="425" y="293" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">
    always 2:1 aspect ratio (e.g. 4096×2048)
  </text>

  <!-- Title -->
  <text x="425" y="30" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">
    Equirectangular (Lat-Long) Projection
  </text>

  <!-- Sphere label -->
  <text x="130" y="15" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">
    360° Sphere of Directions
  </text>
  <text x="130" y="306" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#6B7280">
    longitude → x,  latitude → y
  </text>

</svg>
