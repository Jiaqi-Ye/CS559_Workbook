<?xml version="1.0" encoding="UTF-8"?>
<!--
  Blinn-Phong Half Vector Diagram
  Shows: surface normal n, light direction l, eye direction e,
  and the half vector h = normalize(l + e) that bisects them.
  CS559 Computer Graphics - Workbook 05
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 580 360"
     width="580" height="360">

  <title>Blinn-Phong Half Vector: h bisects l and e</title>
  <desc>The half vector h is the unit vector halfway between l and e.
  When h aligns with n, the surface is at peak specular brightness.</desc>

  <defs>
    <!-- Arrowhead: normal n (blue) -->
    <marker id="bp-arr-n" viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1E40AF"/>
    </marker>
    <!-- Arrowhead: light direction l (amber) -->
    <marker id="bp-arr-l" viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#92400E"/>
    </marker>
    <!-- Arrowhead: eye direction e (purple) -->
    <marker id="bp-arr-e" viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#6D28D9"/>
    </marker>
    <!-- Arrowhead: half vector h (teal) -->
    <marker id="bp-arr-h" viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#0F766E"/>
    </marker>
    <!-- Clip path for surface hatching -->
    <clipPath id="bp-clip-surf">
      <rect x="40" y="278" width="500" height="52"/>
    </clipPath>
  </defs>


  <!-- ═══════════════════════════════════════════════
       SURFACE
       ═══════════════════════════════════════════════ -->
  <g id="bp-surface">
    <rect x="40" y="278" width="500" height="52" fill="#D1D5DB"/>
    <g clip-path="url(#bp-clip-surf)" stroke="#9CA3AF" stroke-width="0.9" stroke-linecap="butt">
      <line x1="-15" y1="278" x2="37"  y2="330"/>
      <line x1="5"   y1="278" x2="57"  y2="330"/>
      <line x1="25"  y1="278" x2="77"  y2="330"/>
      <line x1="45"  y1="278" x2="97"  y2="330"/>
      <line x1="65"  y1="278" x2="117" y2="330"/>
      <line x1="85"  y1="278" x2="137" y2="330"/>
      <line x1="105" y1="278" x2="157" y2="330"/>
      <line x1="125" y1="278" x2="177" y2="330"/>
      <line x1="145" y1="278" x2="197" y2="330"/>
      <line x1="165" y1="278" x2="217" y2="330"/>
      <line x1="185" y1="278" x2="237" y2="330"/>
      <line x1="205" y1="278" x2="257" y2="330"/>
      <line x1="225" y1="278" x2="277" y2="330"/>
      <line x1="245" y1="278" x2="297" y2="330"/>
      <line x1="265" y1="278" x2="317" y2="330"/>
      <line x1="285" y1="278" x2="337" y2="330"/>
      <line x1="305" y1="278" x2="357" y2="330"/>
      <line x1="325" y1="278" x2="377" y2="330"/>
      <line x1="345" y1="278" x2="397" y2="330"/>
      <line x1="365" y1="278" x2="417" y2="330"/>
      <line x1="385" y1="278" x2="437" y2="330"/>
      <line x1="405" y1="278" x2="457" y2="330"/>
      <line x1="425" y1="278" x2="477" y2="330"/>
      <line x1="445" y1="278" x2="497" y2="330"/>
      <line x1="465" y1="278" x2="517" y2="330"/>
      <line x1="485" y1="278" x2="537" y2="330"/>
      <line x1="505" y1="278" x2="557" y2="330"/>
    </g>
    <line x1="40" y1="278" x2="540" y2="278" stroke="#1F2937" stroke-width="2.5"/>
    <text x="455" y="305" font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#6B7280">surface</text>
  </g>


  <!-- ═══════════════════════════════════════════════
       ORIGIN POINT
       ═══════════════════════════════════════════════ -->
  <circle cx="290" cy="278" r="4.5" fill="#1F2937"/>


  <!-- ═══════════════════════════════════════════════
       LIGHT DIRECTION  l  (amber, 50° upper-left)
       dx = -sin(50°)*155 = -118.7,  dy = -cos(50°)*155 = -99.7
       Tip: (171, 178)
       ═══════════════════════════════════════════════ -->
  <line x1="290" y1="278" x2="171" y2="178"
        stroke="#92400E" stroke-width="2.5" marker-end="url(#bp-arr-l)"/>
  <text x="147" y="171" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="bold" font-size="24" fill="#92400E">l</text>


  <!-- ═══════════════════════════════════════════════
       EYE DIRECTION  e  (purple, 30° upper-right)
       dx = +sin(30°)*155 = +77.5,  dy = -cos(30°)*155 = -134.2
       Tip: (368, 144)
       ═══════════════════════════════════════════════ -->
  <line x1="290" y1="278" x2="368" y2="144"
        stroke="#6D28D9" stroke-width="2.5" marker-end="url(#bp-arr-e)"/>
  <text x="373" y="136" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="bold" font-size="24" fill="#6D28D9">e</text>


  <!-- ═══════════════════════════════════════════════
       HALF VECTOR  h  (teal, bisects l and e)
       l unit vector: (-sin50°, -cos50°) = (-0.766, -0.643)
       e unit vector: (+sin30°, -cos30°) = (+0.500, -0.866)
       l+e = (-0.266, -1.509),  |l+e| = sqrt(0.0708+2.277) = 1.531
       h unit vector: (-0.174, -0.985)
       so h is 10° left of vertical
       dx = -sin(10°)*175 = -30.4,  dy = -cos(10°)*175 = -172.3
       Tip: (260, 106)
       ═══════════════════════════════════════════════ -->
  <line x1="290" y1="278" x2="260" y2="106"
        stroke="#0F766E" stroke-width="2.8" marker-end="url(#bp-arr-h)"/>
  <text x="265" y="94" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="bold" font-size="24" fill="#0F766E">h</text>


  <!-- ═══════════════════════════════════════════════
       NORMAL VECTOR  n  (blue, straight up)
       shown as a dashed guide to compare with h
       ═══════════════════════════════════════════════ -->
  <line x1="290" y1="278" x2="290" y2="78"
        stroke="#1E40AF" stroke-width="2.5"
        stroke-dasharray="8,4"
        marker-end="url(#bp-arr-n)"/>
  <text x="298" y="70" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="bold" font-size="24" fill="#1E40AF">n</text>


  <!-- ═══════════════════════════════════════════════
       ANGLE ARCS
       l direction: 50° left of up = SVG angle 220°
       e direction: 30° right of up = SVG angle 300°
       h direction: 10° left of up = SVG angle 260°
       n direction: straight up = SVG angle 270°

       Arc α₁: from l to h  (showing equal half-angles)
         r=80: l-side=(290+80·cos220, 278+80·sin220)
               =(290-61.3, 278-51.4)=(228.7, 226.6)
               h-side=(290+80·cos260, 278+80·sin260)
               =(290-13.9, 278-78.8)=(276.1, 199.2)
       Arc α₂: from h to e
         r=80: h-side=(276.1, 199.2) [same]
               e-side=(290+80·cos300, 278+80·sin300)
               =(290+40.0, 278-69.3)=(330.0, 208.7)
       Arc β: from h to n (small, showing h≠n in general)
         r=100: h-side=(290+100·cos260, 278+100·sin260)
                =(290-17.4, 278-98.5)=(272.6, 179.5)
                n-side=(290+100·cos270, 278+100·sin270)
                =(290, 278-100)=(290, 178)
       ═══════════════════════════════════════════════ -->

  <!-- α₁ arc: l to h -->
  <path d="M 229 227 A 80 80 0 0 1 276 199"
        fill="none" stroke="#374151" stroke-width="1.8"/>
  <!-- α₂ arc: h to e -->
  <path d="M 276 199 A 80 80 0 0 1 330 209"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- Tick marks on α₁ and α₂ arcs to show equal half-angles -->
  <!-- α₁ midpoint at SVG angle 240°, r=80: (290+80·cos240, 278+80·sin240)
       = (290-40, 278-69.3) = (250, 208.7)
       Tangent at 240°+90°=330°: (cos330=0.866, sin330=-0.5)
       Tick ±6: from (250-5.2, 208.7+3) to (250+5.2, 208.7-3) = (244.8,211.7) to (255.2,205.7) -->
  <line x1="244.8" y1="211.7" x2="255.2" y2="205.7"
        stroke="#374151" stroke-width="1.8" stroke-linecap="round"/>
  <!-- α₂ midpoint at SVG angle 280°, r=80: (290+80·cos280, 278+80·sin280)
       = (290+13.9, 278-78.8) = (303.9, 199.2)
       Tangent at 280°+90°=10°: (cos10=0.985, sin10=0.174)
       Tick ±6: from (303.9-5.9, 199.2-1.0) to (303.9+5.9, 199.2+1.0) = (298,198.2) to (309.8,200.2) -->
  <line x1="298.0" y1="198.2" x2="309.8" y2="200.2"
        stroke="#374151" stroke-width="1.8" stroke-linecap="round"/>

  <!-- β arc: h to n (small dashed, shows h ≈ n at peak) -->
  <path d="M 273 179 A 100 100 0 0 1 290 178"
        fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Angle labels -->
  <!-- α labels near each tick mark -->
  <text x="233" y="226" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="18" fill="#374151">α</text>
  <text x="310" y="216" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="18" fill="#374151">α</text>

  <!-- β label -->
  <text x="275" y="170" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="18" fill="#374151">β</text>


  <!-- ═══════════════════════════════════════════════
       LIGHT SOURCE SYMBOL (sun) beyond l tip
       l tip: (171, 178).  l unit: (-0.766, -0.643)
       Sun center: tip + 35*l_unit ≈ (171-27, 178-23) = (144, 155)
       ═══════════════════════════════════════════════ -->
  <g id="bp-sun">
    <circle cx="144" cy="155" r="26" fill="#FEF9C3" opacity="0.55"/>
    <circle cx="144" cy="155" r="16" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.8"/>
    <g stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round">
      <line x1="144" y1="134" x2="144" y2="127"/>
      <line x1="144" y1="176" x2="144" y2="183"/>
      <line x1="123" y1="155" x2="116" y2="155"/>
      <line x1="165" y1="155" x2="172" y2="155"/>
      <line x1="129" y1="140" x2="124" y2="135"/>
      <line x1="159" y1="170" x2="164" y2="175"/>
      <line x1="159" y1="140" x2="164" y2="135"/>
      <line x1="129" y1="170" x2="124" y2="175"/>
    </g>
  </g>


  <!-- ═══════════════════════════════════════════════
       EYE SYMBOL beyond e tip
       e tip: (368, 144).  e unit: (0.5, -0.866)
       Eye center: tip + 32*(0.5,-0.866) ≈ (368+16, 144-28) = (384, 116)
       ═══════════════════════════════════════════════ -->
  <g id="bp-eye">
    <ellipse cx="386" cy="114" rx="21" ry="13"
             fill="white" stroke="#6D28D9" stroke-width="1.8"/>
    <circle cx="386" cy="114" r="6" fill="#6D28D9"/>
    <path d="M 365 114 Q 386 100 407 114"
          fill="none" stroke="#6D28D9" stroke-width="1.4"/>
  </g>


  <!-- ═══════════════════════════════════════════════
       FORMULA ANNOTATION
       ═══════════════════════════════════════════════ -->
  <g id="bp-formula">
    <rect x="390" y="240" width="167" height="28" rx="5"
          fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
    <text x="400" y="260"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="16" fill="#1F2937">
      <tspan font-weight="bold" font-style="italic" fill="#0F766E">h</tspan>
      <tspan> = normalize(</tspan>
      <tspan font-weight="bold" font-style="italic" fill="#92400E">l</tspan>
      <tspan> + </tspan>
      <tspan font-weight="bold" font-style="italic" fill="#6D28D9">e</tspan>
      <tspan>)</tspan>
    </text>
  </g>

  <!-- ═══════════════════════════════════════════════
       ANNOTATION: "n·h = cos β (used for shading)"
       ═══════════════════════════════════════════════ -->
  <g id="bp-note">
    <rect x="14" y="148" width="118" height="50" rx="5"
          fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
    <text x="22" y="167"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="15" fill="#166534">
      spec ∝ (
      <tspan font-weight="bold" font-style="italic" fill="#1E40AF">n</tspan>
      ·
      <tspan font-weight="bold" font-style="italic" fill="#0F766E">h</tspan>
      )ⁿ
    </text>
    <text x="22" y="188"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="13" fill="#166534">max when β = 0</text>
  </g>

</svg>
