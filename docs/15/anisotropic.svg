<?xml version="1.0" encoding="UTF-8"?>
<!--
  Anisotropic Filtering Problem
  Shows:
  (A) An elongated pixel footprint in texture space (the true shape)
  (B) The MIP map square approximation — too large, causes blurring
  (C) The anisotropic hack — multiple small squares along the elongated axis
  CS559 Computer Graphics – Workbook 05
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">

  <defs>
    <marker id="aniso-arr" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="7" markerHeight="6" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#374151"/>
    </marker>
    <!-- Texture grid pattern -->
    <pattern id="tex-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#FFFBEB"/>
      <rect width="10" height="10" fill="#FDE68A"/>
      <rect x="10" y="10" width="10" height="10" fill="#FDE68A"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════════════
       PANEL BACKGROUNDS
       ═══════════════════════════════════════════════ -->
  <rect x="0"   y="0" width="220" height="300" fill="#F8FAFC"/>
  <rect x="220" y="0" width="220" height="300" fill="#FFF7F7"/>
  <rect x="440" y="0" width="220" height="300" fill="#F0FDF4"/>

  <!-- Dividers -->
  <line x1="220" y1="0" x2="220" y2="300" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="440" y1="0" x2="440" y2="300" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Panel labels -->
  <text x="110" y="20" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">
    True footprint
  </text>
  <text x="330" y="20" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#DC2626">
    MIP square approx.
  </text>
  <text x="330" y="34" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#DC2626">
    (too blurry)
  </text>
  <text x="550" y="20" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">
    Anisotropic fix
  </text>
  <text x="550" y="34" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#166534">
    (multiple small squares)
  </text>

  <!-- ═══════════════════════════════════════════════
       PANEL A: TRUE FOOTPRINT
       The checkerboard texture with an elongated footprint
       ═══════════════════════════════════════════════ -->
  <rect x="15" y="45" width="190" height="190" fill="url(#tex-grid)"
        stroke="#D97706" stroke-width="1.5"/>

  <!-- Elongated oval/rectangle footprint (pixel is a tall thin strip) -->
  <!-- Footprint: ~20px wide × 100px tall, centered at (110, 140) -->
  <ellipse cx="110" cy="140" rx="18" ry="70"
           fill="#DBEAFE" fill-opacity="0.6"
           stroke="#1D4ED8" stroke-width="2.2"/>
  <!-- Center point -->
  <circle cx="110" cy="140" r="3.5" fill="#1D4ED8"/>
  <!-- Labels for axes -->
  <line x1="92" y1="140" x2="128" y2="140" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="110" y="226"  text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#1D4ED8">narrow</text>
  <text x="110" y="238"  text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#1D4ED8">in u</text>
  <text x="137" y="108" text-anchor="start"
        font-family="Arial, sans-serif" font-size="11" fill="#1D4ED8">tall</text>
  <text x="137" y="120" text-anchor="start"
        font-family="Arial, sans-serif" font-size="11" fill="#1D4ED8">in v</text>

  <text x="110" y="258" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">
    Screen pixel on a
  </text>
  <text x="110" y="271" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#374151">
    steeply foreshortened surface
  </text>


  <!-- ═══════════════════════════════════════════════
       PANEL B: MIP MAP SQUARE APPROXIMATION
       Big square that circumscribes the elongated footprint
       ═══════════════════════════════════════════════ -->
  <rect x="235" y="45" width="190" height="190" fill="url(#tex-grid)"
        stroke="#D97706" stroke-width="1.5"/>

  <!-- The elongated true footprint (faint) -->
  <ellipse cx="330" cy="140" rx="18" ry="70"
           fill="none"
           stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- The MIP square: must circumscribe the ellipse, so side = 2*70 = 140px tall
       → it's a 140×140 square centered at (330, 140) = from (260, 70) to (400, 210) -->
  <rect x="260" y="70" width="140" height="140"
        fill="#FEE2E2" fill-opacity="0.5"
        stroke="#DC2626" stroke-width="2.5"/>

  <!-- Showing "too big" annotation -->
  <!-- Horizontal extent: 140px whereas footprint is only 36px wide → 4× too wide -->
  <line x1="260" y1="220" x2="400" y2="220" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="260" y1="215" x2="260" y2="225" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="400" y1="215" x2="400" y2="225" stroke="#DC2626" stroke-width="1.5"/>
  <text x="330" y="236" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#DC2626">fits the tall dim.</text>
  <text x="330" y="248" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#DC2626">but way too wide →</text>

  <!-- Blurry result annotation -->
  <rect x="242" y="258" width="177" height="30" rx="4"
        fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="330" y="272" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#DC2626">
    Averages too many texels
  </text>
  <text x="330" y="284" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#DC2626">
    → result is over-blurred
  </text>


  <!-- ═══════════════════════════════════════════════
       PANEL C: ANISOTROPIC FIX
       Multiple small squares along the elongated axis
       ═══════════════════════════════════════════════ -->
  <rect x="455" y="45" width="190" height="190" fill="url(#tex-grid)"
        stroke="#D97706" stroke-width="1.5"/>

  <!-- True footprint (faint guide) -->
  <ellipse cx="550" cy="140" rx="18" ry="70"
           fill="none"
           stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Multiple small squares stacked along the v-axis to approximate the elongated shape -->
  <!-- Each square: 36×36 px, covering the ~18-radius width of the footprint -->
  <!-- Stack of 4 squares centered at x=550, spaced 35px apart in v:
       Centers at y=75, 110, 145, 175, 210 — let's do 5 -->
  <g opacity="0.75">
    <rect x="532" y="57"  width="36" height="36" fill="#DCFCE7" fill-opacity="0.7" stroke="#166534" stroke-width="1.8"/>
    <rect x="532" y="93"  width="36" height="36" fill="#DCFCE7" fill-opacity="0.7" stroke="#166534" stroke-width="1.8"/>
    <rect x="532" y="129" width="36" height="36" fill="#DCFCE7" fill-opacity="0.7" stroke="#166534" stroke-width="1.8"/>
    <rect x="532" y="165" width="36" height="36" fill="#DCFCE7" fill-opacity="0.7" stroke="#166534" stroke-width="1.8"/>
    <rect x="532" y="201" width="36" height="36" fill="#DCFCE7" fill-opacity="0.7" stroke="#166534" stroke-width="1.8"/>
  </g>

  <!-- Sample points in each square -->
  <circle cx="550" cy="75"  r="3" fill="#166534"/>
  <circle cx="550" cy="111" r="3" fill="#166534"/>
  <circle cx="550" cy="147" r="3" fill="#166534"/>
  <circle cx="550" cy="183" r="3" fill="#166534"/>
  <circle cx="550" cy="219" r="3" fill="#166534"/>

  <!-- n=5 lookups label -->
  <text x="578" y="75"  font-family="Arial, sans-serif" font-size="10" fill="#166534">lookup 1</text>
  <text x="578" y="111" font-family="Arial, sans-serif" font-size="10" fill="#166534">lookup 2</text>
  <text x="578" y="147" font-family="Arial, sans-serif" font-size="10" fill="#166534">lookup 3</text>
  <text x="578" y="183" font-family="Arial, sans-serif" font-size="10" fill="#166534">lookup 4</text>
  <text x="578" y="219" font-family="Arial, sans-serif" font-size="10" fill="#166534">lookup 5</text>

  <!-- Result annotation -->
  <rect x="462" y="258" width="177" height="30" rx="4"
        fill="#D1FAE5" stroke="#86EFAC" stroke-width="1"/>
  <text x="550" y="272" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065F46">
    5× more lookups,
  </text>
  <text x="550" y="284" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#065F46">
    but much sharper result
  </text>

</svg>
