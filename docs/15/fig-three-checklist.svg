<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380" font-family="'Courier New', Courier, monospace">
  <defs>
    <filter id="drp3" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
    <!-- arrow right -->
    <marker id="arr-r2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="#f8fafc"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="38" fill="#1e293b"/>
  <text x="350" y="25" text-anchor="middle" fill="white" font-size="15" font-weight="700"
        font-family="system-ui, sans-serif">Enabling Shadow Maps in THREE.js — Four Steps</text>

  <!-- Step 1: renderer -->
  <rect x="14" y="54" width="672" height="66" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8" filter="url(#drp3)"/>
  <!-- Step number badge -->
  <circle cx="38" cy="87" r="16" fill="#3b82f6"/>
  <text x="38" y="93" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="system-ui, sans-serif">1</text>
  <!-- Code -->
  <text x="62" y="80" fill="#1e3a8a" font-size="14">renderer.shadowMap.enabled = true;</text>
  <!-- Description -->
  <text x="62" y="105" fill="#475569" font-size="12"
        font-family="system-ui, sans-serif">Sets up multi-pass rendering — the engine will now do a shadow pass before the camera pass.</text>
  <!-- Pipeline tag -->
  <rect x="572" y="60" width="108" height="20" rx="10" fill="#dbeafe"/>
  <text x="626" y="74" text-anchor="middle" fill="#1e40af" font-size="10"
        font-family="system-ui, sans-serif" font-weight="700">RENDERER</text>

  <!-- Arrow 1→2 -->
  <line x1="350" y1="120" x2="350" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-r2)"/>

  <!-- Step 2: light -->
  <rect x="14" y="132" width="672" height="66" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8" filter="url(#drp3)"/>
  <circle cx="38" cy="165" r="16" fill="#22c55e"/>
  <text x="38" y="171" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="system-ui, sans-serif">2</text>
  <text x="62" y="158" fill="#14532d" font-size="14">spotLight.castShadow = true;</text>
  <text x="62" y="182" fill="#475569" font-size="12"
        font-family="system-ui, sans-serif">Tells this light to generate a shadow map each frame. Each shadow-casting light makes its own map.</text>
  <rect x="572" y="138" width="108" height="20" rx="10" fill="#dcfce7"/>
  <text x="626" y="152" text-anchor="middle" fill="#14532d" font-size="10"
        font-family="system-ui, sans-serif" font-weight="700">LIGHT</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="198" x2="350" y2="208" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-r2)"/>

  <!-- Step 3: castShadow on objects -->
  <rect x="14" y="210" width="672" height="66" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.8" filter="url(#drp3)"/>
  <circle cx="38" cy="243" r="16" fill="#f97316"/>
  <text x="38" y="249" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="system-ui, sans-serif">3</text>
  <text x="62" y="236" fill="#7c2d12" font-size="14">mesh.castShadow = true;</text>
  <text x="62" y="260" fill="#475569" font-size="12"
        font-family="system-ui, sans-serif">Object is rendered in the shadow map pass — it can block light and cast shadows on other objects.</text>
  <rect x="572" y="216" width="108" height="20" rx="10" fill="#ffedd5"/>
  <text x="626" y="230" text-anchor="middle" fill="#7c2d12" font-size="10"
        font-family="system-ui, sans-serif" font-weight="700">GEOMETRY (cast)</text>

  <!-- Arrow 3→4 -->
  <line x1="350" y1="276" x2="350" y2="286" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-r2)"/>

  <!-- Step 4: receiveShadow on objects -->
  <rect x="14" y="288" width="672" height="66" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.8" filter="url(#drp3)"/>
  <circle cx="38" cy="321" r="16" fill="#a855f7"/>
  <text x="38" y="327" text-anchor="middle" fill="white" font-size="14" font-weight="900"
        font-family="system-ui, sans-serif">4</text>
  <text x="62" y="314" fill="#4a044e" font-size="14">mesh.receiveShadow = true;</text>
  <text x="62" y="338" fill="#475569" font-size="12"
        font-family="system-ui, sans-serif">Object's shader will sample the shadow map and darken the surface where the light is blocked.</text>
  <rect x="572" y="294" width="108" height="20" rx="10" fill="#f3e8ff"/>
  <text x="626" y="308" text-anchor="middle" fill="#4a044e" font-size="10"
        font-family="system-ui, sans-serif" font-weight="700">GEOMETRY (receive)</text>

  <!-- Note at bottom -->
  <text x="350" y="368" text-anchor="middle" fill="#64748b" font-size="11"
        font-family="system-ui, sans-serif" font-style="italic">castShadow and receiveShadow are independent — set both to true for most scene objects.</text>
</svg>
