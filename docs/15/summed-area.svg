  <text class="st13" transform="translate(9 13.5)"><tspan class="st14" x="0" y="0">Goal:</tspan><tspan class="st15" x="25.56" y="0" xml:space="preserve"> Compute the sum of the</tspan><tspan class="st15"><tspan x="0" y="12">pixel values within a rectangle (ABCD).</tspan></tspan><tspan class="st15"><tspan x="0" y="24">The rectangle is the filter footprint.</tspan></tspan></text>
  <text class="st13" transform="translate(13.5 148.5)"><tspan class="st14" x="0" y="0">Compute: </tspan><tspan class="st15" x="49.44" y="0">To compute the sum (S) of a rectangle with corners A,B,C,D,</tspan><tspan class="st15"><tspan x="0" y="12" xml:space="preserve">lookup those 4 values, and then compute S=D-C-B+A.  </tspan></tspan></text>
