<!DOCTYPE html>
<html>
  <!-- Demo implemented by GitHub Copilot (GPT-5.3-Codex), directed by user request. -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5-3-2 Texture Wrapping Grid</title>
    <link rel="stylesheet" href="/libs/CS559/style559.css" />
    <style>
      body {
        margin: 0;
        padding: 8px;
      }
      #demo {
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
      }
      .wrap-note {
        margin: 6px 0 10px;
        font-size: 0.95rem;
      }
      .wrap-matrix {
        display: grid;
        grid-template-columns: 110px repeat(3, 1fr);
        gap: 6px;
        width: 100%;
        max-width: 700px;
        align-items: center;
      }
      .matrix-corner {
        min-height: 24px;
      }
      .matrix-col-label,
      .matrix-row-label {
        font-size: 0.9rem;
        line-height: 1.2;
      }
      .matrix-col-label {
        text-align: center;
        font-weight: 600;
      }
      .matrix-row-label {
        text-align: right;
        padding-right: 4px;
        font-weight: 600;
      }
      .matrix-cell {
        border: 1px solid #888;
        background: #fff;
        width: 100%;
        aspect-ratio: 1 / 1;
      }
      .matrix-cell canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/",
          "three/": "https://unpkg.com/three@0.180.0/",
          "CS559/": "/libs/CS559/",
          "CS559-Framework/": "/libs/CS559-Framework/"
        }
      }
    </script>
  </head>
  <body>
    <div id="demo"></div>
    <script src="./wrapping-grid.js" type="module" defer></script>
  </body>
</html>
