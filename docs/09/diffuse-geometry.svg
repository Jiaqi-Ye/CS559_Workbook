<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lambert Diffuse Shading Geometry
  Illustrates: surface normal n, light direction l, and angle theta
  CS559 Computer Graphics - Workbook 05
  Editable in Adobe Illustrator
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 540 360"
     width="540" height="360">

  <title>Lambert Diffuse Shading: n · l = cos θ</title>
  <desc>The surface normal n and the direction to the light l form an angle theta. The diffuse brightness is proportional to cos(theta), which equals n dot l for unit vectors.</desc>

  <defs>
    <!-- Arrowhead for normal vector n (blue) -->
    <marker id="arr-n"
            viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7"
            orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1E40AF"/>
    </marker>

    <!-- Arrowhead for light direction vector l (amber) -->
    <marker id="arr-l"
            viewBox="0 0 12 8" refX="11" refY="4"
            markerWidth="9" markerHeight="7"
            orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#92400E"/>
    </marker>

    <!-- Clip path for surface hatching -->
    <clipPath id="clip-surface">
      <rect x="50" y="290" width="440" height="52"/>
    </clipPath>
  </defs>


  <!-- ═══════════════════════════════════════════════
       SURFACE
       ═══════════════════════════════════════════════ -->
  <g id="g-surface">

    <!-- Surface body fill -->
    <rect id="surface-fill" x="50" y="290" width="440" height="52" fill="#D1D5DB"/>

    <!-- Engineering hatch lines at 45°, clipped to surface rect -->
    <!-- Lines run from (x, 290) to (x+52, 342) at 45° -->
    <g id="surface-hatch" clip-path="url(#clip-surface)"
       stroke="#9CA3AF" stroke-width="0.9" stroke-linecap="butt">
      <line x1="0"   y1="290" x2="52"  y2="342"/>
      <line x1="20"  y1="290" x2="72"  y2="342"/>
      <line x1="40"  y1="290" x2="92"  y2="342"/>
      <line x1="60"  y1="290" x2="112" y2="342"/>
      <line x1="80"  y1="290" x2="132" y2="342"/>
      <line x1="100" y1="290" x2="152" y2="342"/>
      <line x1="120" y1="290" x2="172" y2="342"/>
      <line x1="140" y1="290" x2="192" y2="342"/>
      <line x1="160" y1="290" x2="212" y2="342"/>
      <line x1="180" y1="290" x2="232" y2="342"/>
      <line x1="200" y1="290" x2="252" y2="342"/>
      <line x1="220" y1="290" x2="272" y2="342"/>
      <line x1="240" y1="290" x2="292" y2="342"/>
      <line x1="260" y1="290" x2="312" y2="342"/>
      <line x1="280" y1="290" x2="332" y2="342"/>
      <line x1="300" y1="290" x2="352" y2="342"/>
      <line x1="320" y1="290" x2="372" y2="342"/>
      <line x1="340" y1="290" x2="392" y2="342"/>
      <line x1="360" y1="290" x2="412" y2="342"/>
      <line x1="380" y1="290" x2="432" y2="342"/>
      <line x1="400" y1="290" x2="452" y2="342"/>
      <line x1="420" y1="290" x2="472" y2="342"/>
      <line x1="440" y1="290" x2="492" y2="342"/>
      <line x1="460" y1="290" x2="512" y2="342"/>
      <line x1="480" y1="290" x2="532" y2="342"/>
    </g>

    <!-- Surface top edge line -->
    <line id="surface-edge"
          x1="50" y1="290" x2="490" y2="290"
          stroke="#1F2937" stroke-width="2.5"/>

    <!-- "surface" label -->
    <text id="label-surface"
          x="408" y="316"
          font-family="Arial, Helvetica, sans-serif"
          font-size="13" fill="#6B7280">surface</text>
  </g>


  <!-- ═══════════════════════════════════════════════
       ORIGIN POINT (where vectors meet the surface)
       ═══════════════════════════════════════════════ -->
  <circle id="origin-dot"
          cx="270" cy="290" r="4"
          fill="#1F2937"/>


  <!-- ═══════════════════════════════════════════════
       NORMAL VECTOR  n  (blue, straight up)
       ═══════════════════════════════════════════════ -->
  <g id="g-normal">
    <line id="vec-n"
          x1="270" y1="290" x2="270" y2="87"
          stroke="#1E40AF" stroke-width="2.5"
          marker-end="url(#arr-n)"/>
    <!-- Label: bold italic n -->
    <text id="label-n"
          x="281" y="76"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-weight="bold"
          font-size="24" fill="#1E40AF">n</text>
  </g>


  <!-- ═══════════════════════════════════════════════
       LIGHT DIRECTION VECTOR  l  (amber, upper-left at 45°)
       l is the direction FROM the surface TOWARD the light.
       Direction: (-1, -1)/sqrt(2), i.e., 45° from vertical.
       End point: (270 - 132*0.707, 290 - 132*0.707) ≈ (177, 197)
       Using a longer vector for visual clarity: length ~155px
       End: (270 - 109.6, 290 - 109.6) ≈ (160, 180)
       ═══════════════════════════════════════════════ -->
  <g id="g-light-dir">
    <line id="vec-l"
          x1="270" y1="290" x2="138" y2="158"
          stroke="#92400E" stroke-width="2.5"
          marker-end="url(#arr-l)"/>
    <!-- Label: bold italic l -->
    <text id="label-l"
          x="110" y="150"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-weight="bold"
          font-size="24" fill="#92400E">l</text>
  </g>


  <!-- ═══════════════════════════════════════════════
       ANGLE ARC  θ  between n and l
       Center: (270, 290), radius: 58
       n direction is at SVG angle 270° (straight up):
         point = (270, 290-58) = (270, 232)
       l direction is at SVG angle 225° (upper-left, 45° from n):
         point = (270 + 58*cos(225°), 290 + 58*sin(225°))
               = (270 - 41.01, 290 - 41.01)
               = (229, 249)
       Arc sweeps clockwise (sweep-flag=1) from 225° to 270°
       = a 45° arc (small arc: large-arc-flag=0)
       ═══════════════════════════════════════════════ -->
  <g id="g-angle">
    <path id="arc-theta"
          d="M 229 249 A 58 58 0 0 1 270 232"
          fill="none"
          stroke="#374151" stroke-width="1.8"/>

    <!-- θ label, placed at the midpoint of the arc (247.5°, r=74) -->
    <!-- mid angle 247.5°: cos=-0.383, sin=-0.924 -->
    <!-- point: (270-28.3, 290-68.4) = (242, 222) -->
    <text id="label-theta"
          x="233" y="220"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"
          font-size="20" fill="#374151">θ</text>
  </g>


  <!-- ═══════════════════════════════════════════════
       LIGHT SOURCE SYMBOL
       Centered near the tip of l, at (88, 112)
       (In the direction l points from the surface center)
       ═══════════════════════════════════════════════ -->
  <g id="g-light-source">
    <!-- Soft glow ring -->
    <circle cx="88" cy="112" r="28"
            fill="#FEF9C3" opacity="0.55"/>
    <!-- Sun disc -->
    <circle cx="88" cy="112" r="17"
            fill="#FDE68A" stroke="#F59E0B" stroke-width="1.8"/>
    <!-- Rays (8 directions) -->
    <g id="sun-rays" stroke="#F59E0B" stroke-width="1.6" stroke-linecap="round">
      <line x1="88" y1="89"  x2="88"  y2="82"/>   <!-- up -->
      <line x1="88" y1="135" x2="88"  y2="142"/>  <!-- down -->
      <line x1="65" y1="112" x2="58"  y2="112"/>  <!-- left -->
      <line x1="111" y1="112" x2="118" y2="112"/> <!-- right -->
      <line x1="73"  y1="97"  x2="68"  y2="92"/>  <!-- upper-left -->
      <line x1="103" y1="127" x2="108" y2="132"/> <!-- lower-right -->
      <line x1="103" y1="97"  x2="108" y2="92"/>  <!-- upper-right -->
      <line x1="73"  y1="127" x2="68"  y2="132"/> <!-- lower-left -->
    </g>
  </g>


  <!-- ═══════════════════════════════════════════════
       FORMULA ANNOTATION  n · l = cos θ
       Placed in the open area upper-right
       ═══════════════════════════════════════════════ -->
  <g id="g-formula">
    <!-- Background pill -->
    <rect x="316" y="148" width="196" height="36"
          rx="5" ry="5"
          fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
    <!-- Formula text with per-tspan color coding -->
    <text x="326" y="173"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="18" fill="#1F2937">
      <tspan id="formula-n"
             font-style="italic" font-weight="bold"
             fill="#1E40AF">n</tspan>
      <tspan dx="2"> · </tspan>
      <tspan id="formula-l"
             font-style="italic" font-weight="bold"
             fill="#92400E">l</tspan>
      <tspan dx="3"> = cos </tspan>
      <tspan font-style="italic">θ</tspan>
    </text>
  </g>

</svg>
