<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      .line { fill: none; stroke: red; stroke-width: 5; stroke-linecap: round; }
      .point { fill: blue; stroke: none; }
      .point-text { fill: blue; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 40px; text-anchor: middle; font-weight: bold; }
      .area-text { fill: red; font-family: 'Times New Roman', Times, serif; font-size: 55px; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>

  <polyline class="line" points="100,300 300,300" /> <polyline class="line" points="300,300 500,300" /> <polyline class="line" points="100,300 200,100 300,300" /> <polyline class="line" points="200,100 400,100 300,300" /> <polyline class="line" points="400,100 500,300 300,300" /> <polyline class="line" points="600,300 900,300" /> <polyline class="line" points="600,300 750,100 900,300" /> <polyline class="line" points="600,300 750,500 750,300" /> <circle class="point" cx="100" cy="300" r="12" id="pt_A" />
  <circle class="point" cx="300" cy="300" r="12" id="pt_B" />
  <circle class="point" cx="200" cy="100" r="12" id="pt_C" />
  <circle class="point" cx="400" cy="100" r="12" id="pt_D" />
  <circle class="point" cx="500" cy="300" r="12" id="pt_E" />

  <circle class="point" cx="600" cy="300" r="12" id="pt_F" />
  <circle class="point" cx="750" cy="100" r="12" id="pt_G" />
  <circle class="point" cx="900" cy="300" r="12" id="pt_H" />
  <circle class="point" cx="750" cy="300" r="12" id="pt_I" />
  <circle class="point" cx="750" cy="500" r="12" id="pt_J" />

  <text class="point-text" x="70" y="370" dx="0">A</text>
  <text class="point-text" x="300" y="370" dx="0">B</text>
  <text class="point-text" x="200" y="65" dx="0">C</text>
  <text class="point-text" x="430" y="65" dx="0">D</text>
  <text class="point-text" x="530" y="370" dx="0">E</text>

  <text class="point-text" x="560" y="300" dy="10">F</text>
  <text class="point-text" x="780" y="65" dx="0">G</text>
  <text class="point-text" x="930" y="300" dy="10">H</text>
  <text class="point-text" x="780" y="350" dx="0">I</text>
  <text class="point-text" x="780" y="550" dx="0">J</text>

  <text class="area-text" x="200" y="250">1</text>
  <text class="area-text" x="300" y="200">2</text>
  <text class="area-text" x="400" y="250">3</text>
  <text class="area-text" x="750" y="220">4</text>
  <text class="area-text" x="700" y="380">5</text>

</svg>
