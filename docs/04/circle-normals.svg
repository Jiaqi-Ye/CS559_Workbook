<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <style>
      .circle-ref { fill: none; stroke: #e0e0e0; stroke-width: 2; stroke-dasharray: 8,4; }
      .hexagon { fill: none; stroke: #333; stroke-width: 3; stroke-linejoin: round; }
      .norm-actual { fill: none; stroke: blue; stroke-width: 3; }
      .norm-vertex { fill: none; stroke: red; stroke-width: 3; }
      .label { font-family: sans-serif; font-size: 14px; font-weight: bold; }
    </style>
    
    <marker id="head-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="blue" />
    </marker>
    <marker id="head-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="red" />
    </marker>
  </defs>

  <circle cx="300" cy="300" r="200" class="circle-ref" />

  <polygon points="500,300 400,126.8 200,126.8 100,300 200,473.2 400,473.2" class="hexagon" />

  <line x1="500" y1="300" x2="550" y2="300" class="norm-vertex" marker-end="url(#head-red)" />
  <line x1="400" y1="126.8" x2="425" y2="83.5" class="norm-vertex" marker-end="url(#head-red)" />
  <line x1="200" y1="126.8" x2="175" y2="83.5" class="norm-vertex" marker-end="url(#head-red)" />
  <line x1="100" y1="300" x2="50" y2="300" class="norm-vertex" marker-end="url(#head-red)" />
  <line x1="200" y1="473.2" x2="175" y2="516.5" class="norm-vertex" marker-end="url(#head-red)" />
  <line x1="400" y1="473.2" x2="425" y2="516.5" class="norm-vertex" marker-end="url(#head-red)" />

  <line x1="450" y1="213.4" x2="493.3" y2="188.4" class="norm-actual" marker-end="url(#head-blue)" />
  <line x1="300" y1="126.8" x2="300" y2="76.8" class="norm-actual" marker-end="url(#head-blue)" />
  <line x1="150" y1="213.4" x2="106.7" y2="188.4" class="norm-actual" marker-end="url(#head-blue)" />
  <line x1="150" y1="386.6" x2="106.7" y2="411.6" class="norm-actual" marker-end="url(#head-blue)" />
  <line x1="300" y1="473.2" x2="300" y2="523.2" class="norm-actual" marker-end="url(#head-blue)" />
  <line x1="450" y1="386.6" x2="493.3" y2="411.6" class="norm-actual" marker-end="url(#head-blue)" />

  <g transform="translate(20,20)">
    <line x1="0" y1="0" x2="30" y2="0" class="norm-actual" marker-end="url(#head-blue)" />
    <text x="40" y="5" class="label" fill="blue">Face Normal (Flat)</text>
    <line x1="0" y1="25" x2="30" y2="25" class="norm-vertex" marker-end="url(#head-red)" />
    <text x="40" y="30" class="label" fill="red">Vertex Normal (Smooth)</text>
  </g>
</svg>
